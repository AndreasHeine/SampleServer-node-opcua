---
name: Container Build

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

on:
  #schedule:
  #  - cron: '21 18 * * *'
  push:
    branches: [main, develop]
    # Publish semver tags as releases.
    tags: ["v*.*.*"]
  pull_request:
    branches: [main, develop]
  merge_group:

jobs:
  build:
    timeout-minutes: 20
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3
        with:
          submodules: recursive
          persist-credentials: true

      - name: Set Registry
        # yamllint disable rule:line-length
        run: |
          #!/bin/bash
          echo IMAGE_REPOSITORY="$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"
          if [ "${{ github.server_url }}" = "https://codeberg.org" ]; then
            echo "REGISTRY=codeberg.org" >> "$GITHUB_ENV"
            echo "REGISTRY_TOKEN=${{ secrets.REGISTRY_TOKEN }}" >> "$GITHUB_ENV"
          else
            echo "REGISTRY=ghcr.io" >> "$GITHUB_ENV"
            echo "REGISTRY_TOKEN=${{ secrets.GITHUB_TOKEN }}" >> "$GITHUB_ENV"
          fi
        # yamllint enable rule:line-length
      - name: Login to Container Registry
        if: ${{ github.event_name != 'pull_request' }}
        uses: docker/login-action@v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ env.REGISTRY_TOKEN }}

      # Extract metadata (tags, labels) for Docker
      # https://github.com/docker/metadata-action
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6.1.0
        with:
          images: "${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}"
          flavor: |
            latest=true
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=ref,event=pr

      # Setup QEMU for Cross-Platform builds
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.1.0

      # Setup BuildX
      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4.1.0

      # Build and push Docker image with Buildx (don't push on PR)
      # https://github.com/docker/build-push-action
      - name: Build and push Docker image
        uses: docker/build-push-action@v7.2.0
        with:
          provenance: false
          context: .
          platforms: linux/amd64, linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
